<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Slips - EPayroll</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><h2>EPayroll</h2></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="employees.html">Employees</a></li>
            <li><a href="departments.html">Departments</a></li>
            <li><a href="attendance.html">Attendance</a></li>
            <li><a href="payroll.html">Payroll</a></li>
            <li><a href="payslips.html" class="active">Salary Slips</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="page-title">Salary Slip Management</h1>

        <div class="form-toggle">
            <button class="btn btn-primary" onclick="togglePayslipForm()">+ Add Salary Slip</button>
        </div>

        <div id="payslipFormContainer" class="form-container hidden">
            <form id="payslipForm" class="form-card">
                <h3 id="slipFormTitle">Add Salary Slip</h3>
                <input type="hidden" id="slip_edit_id">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Employee Name</label>
                        <select id="slip_employee_name" required>
                            <option value="">Select Employee</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Payment Date</label>
                        <input type="date" id="slip_payment_date" required>
                    </div>
                    <div class="form-group">
                        <label>Payment Method</label>
                        <select id="slip_payment_method" required>
                            <option value="Bank Transfer">Bank Transfer</option>
                            <option value="UPI">UPI</option>
                            <option value="Cash">Cash</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Payment Status</label>
                        <select id="slip_payment_status" required>
                            <option value="Paid">Paid</option>
                            <option value="Pending">Pending</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Remarks</label>
                        <input type="text" id="slip_remarks" placeholder="Enter remarks" required>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" class="btn btn-secondary" onclick="cancelSlipEdit()">Cancel</button>
                </div>
            </form>
        </div>

        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Employee Name</th>
                        <th>Payment Date</th>
                        <th>Payment Method</th>
                        <th>Status</th>
                        <th>Remarks</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="payslipTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Employee Management & Payroll System. All rights reserved.</p>
    </footer>

    <script src="/static/script.js"></script>
    <script>loadPayslips();</script>
</body>
</html>
